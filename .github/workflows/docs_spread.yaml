name: Docs spread

on:
  pull_request:
  schedule:
  - cron: "0 15 * * SAT"

jobs:
  test-matrix:
    name: Test matrix
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
      opcli-sha: ${{ steps.workflow-version.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Get workflow version
        id: workflow-version
        uses: canonical/get-workflow-version-action@v1
        with:
          repository-name: canonical/charm-ci
          file-name: integration-test.yml
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: uv tool install "git+https://github.com/canonical/charm-ci.git@${{ steps.workflow-version.outputs.sha }}"

      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      - name: Generate test matrix
        id: matrix
        run: |
          matrix=$(opcli spread jobs --include "docs-ci:*")
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"
          echo "Test matrix: $matrix"

  test:
    name: "${{ matrix.name }}"
    needs: [test-matrix]
    runs-on: ${{ fromJSON(matrix.runs-on) }}
    permissions:
      contents: read
      actions: read
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.test-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        run: sudo snap install astral-uv --classic

      - name: Install opcli
        run: uv tool install "git+https://github.com/canonical/charm-ci.git@${{ needs.test-matrix.outputs.opcli-sha }}"

      - name: Install spread
        run: |
          sudo snap install go --classic
          go install github.com/canonical/spread/cmd/spread@latest
          sudo ln -sf ~/go/bin/spread /usr/local/bin/spread

      - name: Run spread task
        env:
          OPCLI_GIT_REF: ${{ needs.test-matrix.outputs.opcli-sha }}
        run: opcli spread run -- -vv ${{ matrix.selector }}
