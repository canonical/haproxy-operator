version_schema: 2

changes:
  - title: Set X-Forwarded-Proto header by default in haproxy-route
    author: Thanhphan1147
    type: minor
    description: >
      Added `http-request set-header X-Forwarded-Proto` to the haproxy-route
      frontend so backends receive the client-facing request scheme. The value
      is derived from `ssl_fc` rather than hardcoded to `https` because the
      `allow-http` attribute permits plain HTTP requests through.
    urls:
      pr:
        - https://github.com/canonical/haproxy-operator/pull/592
      related_issue: https://github.com/canonical/haproxy-operator/issues/591
    visibility: public
    highlight: false
