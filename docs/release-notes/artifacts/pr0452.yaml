version_schema: 2

changes:
  - title: Added check-alpn to HTTPS backend server configuration
    author: tphan025
    type: minor
    description: >
      Updated the HAProxy route backend server configuration for HTTPS upstreams
      to include `check-alpn h2,http/1.1` together with
      `alpn h2,http/1.1`. This ensures health checks negotiate ALPN consistently
      with HTTPS backend connections. Refactored backend/server configuration
      rendering to use computed properties in state models and updated unit tests
      to cover HTTPS behavior with and without explicit health checks.
    urls:
      pr:
        - https://github.com/canonical/haproxy-operator/pull/452
      related_doc:
      related_issue:
    visibility: public
    highlight: false
