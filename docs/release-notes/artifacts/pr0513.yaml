version_schema: 2

changes:
  - title: Added PROXY protocol support for haproxy-route-tcp backends
    author: tphan025
    type: minor
    description: >
      Added a proxy_protocol option to the haproxy-route-tcp interface
      library (LIBPATCH 3) that appends send-proxy to backend server lines
      when enabled. Requirers can set proxy_protocol=True during
      initialisation, via update_relation, or with the
      enable_proxy_protocol() builder method. Defaults to False for
      backward compatibility.
    urls:
      pr:
        - https://github.com/canonical/haproxy-operator/pull/513
      related_doc:
      related_issue:
    visibility: public
    highlight: false
