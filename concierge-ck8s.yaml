juju:
  channel: 3/stable
  model-defaults:
    test-mode: "true"
    automatically-retry-hooks: "false"

providers:
  lxd:
    enable: true
    bootstrap: true
  k8s:
    enable: true
    bootstrap: false
    channel: 1.32-classic/stable
    features:
      load-balancer:
        enabled: true
        l2-mode: true
        cidrs: 10.43.45.0/24
