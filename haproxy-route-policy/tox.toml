skipsdist = true
skip_missing_interpreters = true
requires = ["tox>=4.21"]
no_package = true
envlist = ["lint", "unit", "static", "coverage-report"]

[env_run_base]
passenv = ["PYTHONPATH"]
runner = "uv-venv-lock-runner"

[env_run_base.setenv]
PYTHONPATH = "{toxinidir}:{[vars]src_path}"
PYTHONBREAKPOINT = "ipdb.set_trace"
PY_COLORS = "1"

[env.unit]
description = "Run unit tests"
commands = [
  [
    "coverage",
    "run",
    "manage.py",
    "test",
    "policy",
    "--settings=haproxy_route_policy.test_settings",
    "-v2",
  ],
]
dependency_groups = ["unit"]

[env.lint]
description = "Check code against coding style standards"
commands = [
  [
    "codespell",
    "{toxinidir}",
  ],
  [
    "ruff",
    "format",
    "--check",
    "--diff",
    { replace = "ref", of = [
      "vars",
      "all_path",
    ], extend = true },
  ],
  [
    "ruff",
    "check",
    { replace = "ref", of = [
      "vars",
      "all_path",
    ], extend = true },
  ],
  [
    "mypy",
    { replace = "ref", of = [
      "vars",
      "all_path",
    ], extend = true },
  ],
]
dependency_groups = ["lint"]


[env.static]
description = "Run static analysis tests"
commands = [
  [
    "bandit",
    "-c",
    "{toxinidir}/pyproject.toml",
    "-r",
    "{[vars]src_path}",
    "{[vars]tst_path}",
  ],
]
dependency_groups = ["static"]

[vars]
src_path = "{toxinidir}/policy/"
tst_path = "{toxinidir}/policy/tests"
all_path = ["{toxinidir}/policy/"]

[env.coverage-report]
description = "Create test coverage report"
commands = [["coverage", "report"]]
dependency_groups = ["coverage-report"]
